<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arcis — Arcis Development Team</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/svg+xml" href="icon.svg">
    <style>
        .team-page-shell {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 24px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .team-page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 60px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 20px;
        }
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            color: var(--text-1);
            padding: 10px 20px;
            border-radius: var(--r-lg);
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.2s ease;
        }
        .back-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.2);
            transform: translateX(-2px);
        }
        .team-page-footer {
            margin-top: auto;
            padding-top: 60px;
            text-align: center;
            font-size: 12px;
            color: var(--text-2);
            border-top: 1px solid var(--border);
        }
    </style>
</head>
<body>

    <!-- Ambient background -->
    <div class="bg-canvas" aria-hidden="true">
        <div class="bg-orb bg-orb--1"></div>
        <div class="bg-orb bg-orb--2"></div>
        <div class="bg-orb bg-orb--3"></div>
        <div class="bg-grid"></div>
        <div class="bg-noise"></div>
    </div>

    <div class="team-page-shell">
        <header class="team-page-header">
            <div class="topbar__brand" style="padding: 0;">
                <div class="brand-logo">
                    <img src="icon.svg" width="28" height="28" alt="Arcis logo">
                </div>
                <span class="brand-name">Arcis</span>
                <span class="brand-badge">TEAM</span>
            </div>
            <a href="/" class="back-btn">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
                Back to Dashboard
            </a>
        </header>

        <main>

                    Arcis Core Engineering
