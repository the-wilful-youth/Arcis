<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arcis Shield</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="popup.css">
</head>
<body>
<div class="popup">

    <!-- Header -->
    <header class="p-header">
        <div class="p-brand">
            <div class="p-logo" aria-hidden="true">
                <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
                    <path d="M9 1L2 4.25V9C2 13.15 5.1 17.05 9 18C12.9 17.05 16 13.15 16 9V4.25L9 1Z"
                          fill="url(#ps-g)" stroke="rgba(171,209,198,0.25)" stroke-width="0.5"/>
                    <path d="M6 9.5L8 11.5L12 7.5" stroke="#312F2C" stroke-width="1.6"
                          stroke-linecap="round" stroke-linejoin="round"/>
                    <defs>
                        <linearGradient id="ps-g" x1="2" y1="1" x2="16" y2="18" gradientUnits="userSpaceOnUse">
                            <stop offset="0%" stop-color="#ABD1C6"/>
                            <stop offset="100%" stop-color="#8bbcb0"/>
                        </linearGradient>
                    </defs>
                </svg>
            </div>
            <span class="p-brand__name">Arcis</span>
            <span class="p-brand__badge">SHIELD</span>
        </div>
        <div class="p-node" role="status">
            <span class="p-node__dot" aria-hidden="true"></span>
            <span class="p-node__label">ACTIVE</span>
        </div>
    </header>

    <!-- Tabs -->
    <div class="p-tabs" role="tablist">
        <button class="p-tab p-tab--active" data-tab="url-tab" role="tab" aria-selected="true" type="button">
            <svg width="12" height="12" viewBox="0 0 12 12" fill="none" aria-hidden="true">
                <circle cx="6" cy="6" r="4.5" stroke="currentColor" stroke-width="1.2"/>
                <path d="M1.5 6h9M6 1.5c-1 1.4-1.7 2.9-1.7 4.5s.7 3.1 1.7 4.5M6 1.5c1 1.4 1.7 2.9 1.7 4.5S7 9.6 6 11" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
            </svg>
            URL Scan
        </button>
        <button class="p-tab" data-tab="email-tab" role="tab" aria-selected="false" type="button">
            <svg width="12" height="12" viewBox="0 0 12 12" fill="none" aria-hidden="true">
                <rect x="1" y="2.5" width="10" height="7.5" rx="1.5" stroke="currentColor" stroke-width="1.2"/>
                <path d="M1 4l5 3.5L11 4" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
            </svg>
            Email Scan
        </button>
    </div>

    <main class="p-main">

        <!-- URL TAB -->
        <div id="url-tab" class="p-pane" role="tabpanel">

            <div class="site-row">
                <span class="site-row__label">Active Tab</span>
                <span id="active-url" class="site-row__url">Detecting…</span>
            </div>

            <button id="scan-btn" class="p-btn" type="button">
                <svg width="13" height="13" viewBox="0 0 13 13" fill="none" aria-hidden="true">
                    <circle cx="5.5" cy="5.5" r="4" stroke="currentColor" stroke-width="1.4"/>
                    <path d="M8.5 8.5L11.5 11.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
                </svg>
                Scan This Tab
            </button>

            <div id="loading-state" class="p-loading hidden" aria-live="polite">
                <div class="p-spinner" aria-hidden="true"></div>
                <span>Analyzing URL…</span>
            </div>

            <div id="result-state" class="p-result hidden" aria-live="polite">
                <div class="p-score">
                    <span id="risk-score" class="p-score__pct">0%</span>
                    <span class="p-score__label">Phishing Risk</span>
                </div>
                <div id="status-alert" class="p-verdict-pill">
                    <svg width="10" height="10" viewBox="0 0 10 10" fill="none" aria-hidden="true">
                        <path d="M2 5.5L4 7.5L8 3.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    SAFE
                </div>
                <div class="p-findings">
                    <span class="p-findings__title">Findings</span>
                    <ul id="findings-list" class="p-findings__list"></ul>
                </div>
            </div>

        </div>

        <!-- EMAIL TAB -->
        <div id="email-tab" class="p-pane hidden" role="tabpanel">

            <form id="email-form" class="p-form" novalidate>
                <div class="p-field">
                    <label class="p-field__label" for="email-sender">Sender</label>
                    <input type="email" id="email-sender" class="p-field__input"
                           placeholder="billing@paypal-verify.com" autocomplete="off" required>
                </div>
                <div class="p-field">
                    <label class="p-field__label" for="email-subject">Subject</label>
                    <input type="text" id="email-subject" class="p-field__input"
                           placeholder="Action Required: Verification" autocomplete="off">
                </div>
                <div class="p-field">
                    <label class="p-field__label" for="email-body">Body Preview</label>
                    <textarea id="email-body" class="p-field__textarea" rows="2"
                              placeholder="Please click the link to verify your account…"></textarea>
                </div>
                <div class="p-auth-grid">
                    <div class="p-field">
                        <label class="p-field__label" for="email-spf">SPF</label>
                        <select id="email-spf" class="p-field__select">
                            <option value="none">None</option>
                            <option value="pass">Pass</option>
                            <option value="fail">Fail</option>
                        </select>
                    </div>
                    <div class="p-field">
                        <label class="p-field__label" for="email-dkim">DKIM</label>
                        <select id="email-dkim" class="p-field__select">
                            <option value="none">None</option>
                            <option value="pass">Pass</option>
                            <option value="fail">Fail</option>
                        </select>
                    </div>
                    <div class="p-field">
                        <label class="p-field__label" for="email-dmarc">DMARC</label>
                        <select id="email-dmarc" class="p-field__select">
                            <option value="none">None</option>
                            <option value="pass">Pass</option>
                            <option value="fail">Fail</option>
                        </select>
                    </div>
                </div>
                <button type="submit" id="email-scan-btn" class="p-btn">
                    <svg width="13" height="13" viewBox="0 0 13 13" fill="none" aria-hidden="true">
                        <rect x="1" y="2.5" width="11" height="8.5" rx="1.5" stroke="currentColor" stroke-width="1.4"/>
                        <path d="M1 5l5.5 3.5L12 5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
                    </svg>
                    Verify Sender
                </button>
            </form>

            <div id="email-loading-state" class="p-loading hidden" aria-live="polite">
                <div class="p-spinner" aria-hidden="true"></div>
                <span>Verifying sender…</span>
            </div>

            <div id="email-result-state" class="p-result hidden" aria-live="polite">
                <div class="p-score">
                    <span id="email-risk-score" class="p-score__pct">0%</span>
                    <span class="p-score__label">Sender Risk</span>
                </div>
                <div id="email-status-alert" class="p-verdict-pill">
                    <svg width="10" height="10" viewBox="0 0 10 10" fill="none" aria-hidden="true">
                        <path d="M2 5.5L4 7.5L8 3.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    SAFE SENDER
                </div>
                <div class="p-findings">
                    <span class="p-findings__title">Risk Signals</span>
                    <ul id="email-findings-list" class="p-findings__list"></ul>
                </div>
            </div>

        </div>

    </main>

    <footer class="p-footer">
        LightGBM · XGBoost ONNX · Arcis Threat Labs
    </footer>

</div>
<script src="popup.js"></script>
</body>
</html>
