version: '3.8'

services:
  backend:
    build: .
    container_name: arcis-backend
    restart: always
    ports:
      - "5001:5001"
    environment:
      - PORT=5001
      - ENV=production
      - ARCIS_ALLOWED_ORIGINS=https://arcis-dvgq.onrender.com
      - ARCIS_API_KEY=${ARCIS_API_KEY}   # Set this in your shell environment or a .env file — never hardcode

  frontend:
    image: nginx:alpine
    container_name: arcis-frontend
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
