version: '3.8'

services:
  backend:
    build: .
    container_name: arcis-backend
    restart: always
    ports:
      - "5001:5001"
    environment:
      - PORT=5001
      - FLASK_ENV=production

  frontend:
    image: nginx:alpine
    container_name: arcis-frontend
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
